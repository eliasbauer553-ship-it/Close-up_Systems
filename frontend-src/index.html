<!-- Reihenfolge ist wichtig: jede Datei baut auf den vorherigen auf.
     Alle Dateien teilen sich denselben globalen Scope (Standard-Browserverhalten
     bei mehreren <script>-Tags), daher braucht es keinen Bundler.

     Die "?v=12"-Query-Parameter sind bewusstes Cache-Busting: Cloudflare
     Worker Static Assets werden vom Browser sehr aggressiv gecacht -- ohne
     Versionsnummer wuerde nach einem Deploy mit geaenderten Dateien manchmal
     noch der alte JS-Stand aus dem Browser-Cache geladen. Bei jedem
     inhaltlichen Update diese Nummer erhoehen. -->

<!-- Kern / Utilities -->
<script type="text/babel" src="js/core/icons.js?v=12"></script>
