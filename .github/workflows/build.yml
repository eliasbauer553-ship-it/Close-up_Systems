name: Build Desktop Installers & Release

on:
  workflow_dispatch: {}
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            name: windows
          - platform: macos-latest
            name: macos
          - platform: ubuntu-22.04
            name: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Abhaengigkeiten cachen
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Linux-Systemabhaengigkeiten installieren
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libsoup2.4-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: npm-Abhaengigkeiten installieren
        run: npm install

      # Baut die App und erstellt automatisch das GitHub Release
      - name: App bauen & als Release veroeffentlichen
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Falls via "Run workflow" gestartet, wird "v1.0.0-draft" als Fallback genutzt:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v1.0.0-draft' }}
          releaseName: 'Close-up Systems ${{ github.ref_name }}'
          releaseBody: 'Neuer Release-Build von Close-up Systems.'
          releaseDraft: true
          prerelease: false

      # Speichert die Dateien als Action-Artefakte
      - name: Installer als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: close-up-systems-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: warn
