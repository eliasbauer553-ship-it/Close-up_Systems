name: Build Desktop Installers

on:
  workflow_dispatch: {}
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            name: windows
          - platform: macos-latest
            name: macos
          - platform: ubuntu-22.04
            name: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Abhaengigkeiten cachen
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Linux-Systemabhaengigkeiten installieren
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: npm-Abhaengigkeiten installieren
        run: npm install

      - name: Tauri-CLI installieren
        run: cargo install tauri-cli --version "^1" --locked

      - name: App bauen (Frontend + Installer)
        run: npm run tauri:build

      - name: Installer als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: close-up-systems-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: warn
